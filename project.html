<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Projeto — Detalhes</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .project-hero {
            width: 100%;
            max-width: none;
            margin: 0;
            padding: 28px 24px 40px;
        }

        .project-gallery {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            grid-auto-rows: minmax(520px, auto);
            gap: 24px;
            margin: 24px 0 0;
            width: 100%;
            max-width: 1400px;
        }

        .project-gallery .image-wrapper {
            background-color: transparent;
            box-shadow: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 520px;
        }

        .project-gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 18px;
            display: block;
        }

        .image-caption {
            padding: 0.9rem 1rem;
            color: #444;
            font-size: 0.92rem;
            line-height: 1.45;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            margin-top: -6px;
        }

        .project-meta {
            color: #666;
            margin-top: 8px;
        }

        @media (max-width: 900px) {
            .project-hero {
                padding: 24px 18px 32px;
            }

            .project-gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header class="main-header">
        <nav class="nav-links">
            <a href="index.html" class="nav-item">Voltar</a>
        </nav>
    </header>

    <main class="project-hero" id="project-root">
        <h1 id="project-title">Carregando...</h1>
        <div id="project-intro" class="project-meta"></div>
        <p id="project-description"></p>

        <div class="project-gallery" id="project-gallery"></div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Portfólio da Nicoly</p>
    </footer>

    <div class="lightbox" id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" src="" alt="">
        <div class="lightbox-caption" id="lightbox-caption"></div>
    </div>

    <script>
        (function () {
            function qs(key) {
                const params = new URLSearchParams(window.location.search);
                return params.get(key);
            }

            const projects = {
                'residencia-linhas-fluidas': {
                    title: 'Residência Linhas Fluídas',
                    intro: 'Arquitetura residencial integrando luz natural e minimalismo.',
                    description: 'Projeto residencial com ênfase em fluxos orgânicos, materiais naturais e soluções de iluminação que ampliam espaços pequenos.',
                    images: [
                        'https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=1200&q=80',
                        'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80'
                    ]
                },
                'apartamento-quartzo-rose': {
                    title: 'Apartamento Quartzo Rose',
                    intro: 'Design de interiores em tons pastéis e texturas suaves.',
                    description: 'Ambiente assinado com paleta aconchegante, móveis sob medida e iluminação cenográfica para destacar pontos de interesse.',
                    images: [
                        'https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?auto=format&fit=crop&w=1200&q=80',
                        'https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1200&q=80'
                    ]

                },
                'teste': {
                    title: 'Teste',
                    intro: 'Design de interiores em tons pastéis e texturas suaves.',
                    description: 'Ambiente assinado com paleta aconchegante, móveis sob medida e iluminação cenográfica para destacar pontos de interesse.',
                    images: [
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.46%20(1).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.46%20(2).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.46%20(3).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.46%20(4).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.46.jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.47%20(1).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.47%20(2).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.47%20(3).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.47%20(4).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.47%20(5).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.47%20(6).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.47.jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.48%20(1).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.48%20(2).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.48%20(3).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.48.jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.49%20(1).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.49%20(2).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.49%20(3).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.49%20(4).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.49%20(5).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.49.jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.50%20(1).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.50%20(2).jpeg',
                        'imagens/Teste/WhatsApp%20Image%202026-06-05%20at%2014.52.50.jpeg'
                    ]
                },
                'pavilhao-cupula-dourada': {
                    title: 'Pavilhão Cúpula Dourada',
                    intro: 'Estrutura contemporânea com materiais reflexivos.',
                    description: 'Pavilhão que explora vãos livres e superfícies metálicas para criar composições luminosas e cenográficas.',
                    images: [
                        'https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?auto=format&fit=crop&w=1200&q=80',
                        'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80'
                    ]
                },
                'living-conforto-moderno': {
                    title: 'Living Conforto Moderno',
                    intro: 'Sala integrada com mobiliário autoral.',
                    description: 'Projeto de sala de estar que combina peças contemporâneas, texturas naturais e detalhes metálicos para equilíbrio visual.',
                    images: [
                        'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&w=1200&q=80',
                        'https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1200&q=80'
                    ]
                }
            };

            const id = qs('id');
            const container = document.getElementById('project-root');
            const titleEl = document.getElementById('project-title');
            const descEl = document.getElementById('project-description');
            const introEl = document.getElementById('project-intro');
            const gallery = document.getElementById('project-gallery');

            if (!id || !projects[id]) {
                titleEl.innerText = 'Projeto não encontrado';
                descEl.innerText = 'O projeto que você procurou não está disponível. Volte para o portfólio e tente outro.';
                introEl.innerText = '';
                return;
            }

            const p = projects[id];
            titleEl.innerText = p.title;
            introEl.innerText = p.intro;
            descEl.innerText = p.description;
            const project = p;

            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxCaption = document.getElementById('lightbox-caption');
            const lightboxClose = document.querySelector('.lightbox-close');

            const openLightbox = (src, title) => {
                if (!lightbox || !lightboxImg) return;
                lightboxImg.src = src;
                lightboxCaption.innerText = title;
                lightbox.style.display = 'flex';
                document.body.style.overflow = 'hidden';
            };

            const closeLightbox = () => {
                if (!lightbox) return;
                lightbox.style.display = 'none';
                document.body.style.overflow = 'auto';
            };

            const createImageWrapper = (src, title) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'image-wrapper card-hidden';
                const img = document.createElement('img');
                img.src = src;
                img.alt = title;
                wrapper.appendChild(img);

                const caption = document.createElement('div');
                caption.className = 'image-caption';
                caption.innerText = title;
                wrapper.appendChild(caption);

                wrapper.addEventListener('mousemove', (e) => {
                    const rect = wrapper.getBoundingClientRect();
                    const px = (e.clientX - rect.left) / rect.width;
                    const py = (e.clientY - rect.top) / rect.height;
                    const rotateY = (px - 0.5) * 12;
                    const rotateX = (0.5 - py) * 8;
                    img.style.transform = `perspective(900px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
                    img.style.boxShadow = '0 20px 40px rgba(0,0,0,0.08)';
                });

                wrapper.addEventListener('mouseleave', () => {
                    img.style.transform = '';
                    img.style.boxShadow = '';
                });

                wrapper.addEventListener('click', () => openLightbox(src, title));

                return wrapper;
            };

            const animateGallery = () => {
                const items = document.querySelectorAll('.project-gallery .card-hidden');
                const observer = new IntersectionObserver((entries, obs) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('card-visible');
                            obs.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.15, rootMargin: '0px 0px -50px 0px' });
                items.forEach(item => observer.observe(item));
            };

            project.images.forEach(src => gallery.appendChild(createImageWrapper(src, project.title)));
            animateGallery();




            if (lightboxClose) {
                lightboxClose.addEventListener('click', closeLightbox);
            }

            if (lightbox) {
                lightbox.addEventListener('click', (e) => {
                    if (e.target === lightbox) {
                        closeLightbox();
                    }
                });
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && lightbox && lightbox.style.display === 'flex') {
                    closeLightbox();
                }
            });
        })();
    </script>
</body>

</html>
